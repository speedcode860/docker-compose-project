version: "3.9"

services:

  nginx:
    image: nginx:1.25
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - frontend
    restart: unless-stopped

  api:
    build: ./
    container_name: api
    environment:
      REDIS_HOST: redis
      DB_HOST: db
      DB_NAME: game
      DB_USER: gameuser
      DB_PASSWORD: gamepass
    networks:
      - frontend
      - backend
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: redis
    networks:
      - backend
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: game
      POSTGRES_USER: gameuser
      POSTGRES_PASSWORD: gamepass
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend
    restart: unless-stopped

networks:
  frontend:
  backend:

volumes:
  db_data:
